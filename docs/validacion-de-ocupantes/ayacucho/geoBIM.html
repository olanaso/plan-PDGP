<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>IFC (glTF) sobre MapLibre con deck.gl</title>
    <style>
        html,
        body,
        #map {
            height: 100%;
            margin: 0
        }

        #deck-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <link href="https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.js"></script>
</head>

<body>
    <div id="map"></div>
    <canvas id="deck-canvas"></canvas>
    <script type="module">
        import * as deck from "https://unpkg.com/deck.gl@latest/dist.min.js";

        const map = new maplibregl.Map({
            container: "map",
            style: "https://demotiles.maplibre.org/style.json",
            center: [-77.03, -12.05],
            zoom: 17,
            pitch: 60,
            bearing: 20
        });

        // Ejemplo alternativo: Cargar un modelo glTF diferente (puedes cambiar la URL por otro modelo)
        const MODEL_URL = "https://raw.githubusercontent.com/visgl/deck.gl-data/master/examples/scenegraph-layer/robot.glb";

        // Crear una nueva instancia de Deck.gl con el modelo alternativo
        const deckInstance = new deck.Deck({
            canvas: 'deck-canvas',
            initialViewState: {
                longitude: -77.03,
                latitude: -12.05,
                zoom: 17,
                pitch: 60,
                bearing: 20
            },
            controller: true,
            layers: [
                new deck.ScenegraphLayer({
                    id: "ifc-model",
                    data: [{ position: [-77.03, -12.05, 0] }], // lon, lat, alt(m)
                    getPosition: d => d.position,
                    scenegraph: MODEL_URL,
                    sizeScale: 1,
                    pickable: true
                })
            ]
        });

        // Sincronizar vista entre MapLibre y Deck.gl
        map.on('move', () => {
            const center = map.getCenter();
            deckInstance.setProps({
                viewState: {
                    longitude: center.lng,
                    latitude: center.lat,
                    zoom: map.getZoom(),
                    pitch: map.getPitch(),
                    bearing: map.getBearing()
                }
            });
        });
    </script>
</body>

</html>
