  <script>




    // 1️⃣ Token de Mapbox
    mapboxgl.accessToken = 'pk.eyJ1Ijoib2xhbmFzbyIsImEiOiJjamU0OGszdjAyOWp0MnFxbGJtM2ltbXd4In0.cl5AeTAjfeAE4lOXczMEKA';

    const mapa = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/olanaso/cme38xl1f00oc01ry7t73hw1w',
      center: [-70.1387, -15.4726], // Corrige el centro con valores válidos del geojson
      zoom: 14
    });

    // Agregar control de geolocalización
    const geolocate = new mapboxgl.GeolocateControl({
      positionOptions: {
        enableHighAccuracy: true
      },
      trackUserLocation: true,
      showUserHeading: true
    });

    // Añadir el botón al mapa
    mapa.addControl(geolocate, 'top-right');

    mapa.on('load', () => {

      // Cargar la capa GeoJSON
      mapa.addSource('predios', {
        type: 'geojson',
        data: predioscaja
      });

      // Capa principal de polígonos
      mapa.addLayer({
        id: 'predios-fill',
        type: 'fill',
        source: 'predios',
        paint: {
          'fill-color': '#3B82F6', // Azul
          'fill-opacity': 0.3,
          'fill-outline-color': '#1E40AF'
        }
      });

      // Capa de borde de polígonos
      mapa.addLayer({
        id: 'predios-border',
        type: 'line',
        source: 'predios',
        paint: {
          'line-color': '#1E40AF',
          'line-width': 2
        }
      });

      // Capa para resaltar al hacer hover
      mapa.addLayer({
        id: 'predios-hover',
        type: 'fill',
        source: 'predios',
        paint: {
          'fill-color': '#F59E0B', // Amarillo
          'fill-opacity': 0.5
        },
        filter: ['==', ['get', 'Name'], ''] // Inicialmente vacío
      });

      // Capa para resaltar al hacer clic
      mapa.addLayer({
        id: 'predio-highlight',
        type: 'fill',
        source: 'predios',
        paint: {
          'fill-color': '#EF4444', // Rojo
          'fill-opacity': 0.6
        },
        filter: ['==', ['get', 'Name'], ''] // Inicialmente vacío
      });

      // Variable para almacenar el ID del feature resaltado
      let hoveredFeatureId = null;
      let clickedFeatureId = null;

      // Evento cuando el mouse entra en un polígono
      mapa.on('mouseenter', 'predios-fill', function (e) {
        if (e.features.length > 0) {
          if (hoveredFeatureId !== null) {
            mapa.setFilter('predios-hover', ['!=', ['get', 'Name'], hoveredFeatureId]);
          }
          hoveredFeatureId = e.features[0].properties.Name;
          mapa.setFilter('predios-hover', ['==', ['get', 'Name'], hoveredFeatureId]);
          mapa.getCanvas().style.cursor = 'pointer';
        }
      });

      // Evento cuando el mouse sale de un polígono
      mapa.on('mouseleave', 'predios-fill', function () {
        if (hoveredFeatureId !== null) {
          mapa.setFilter('predios-hover', ['==', ['get', 'Name'], '']);
          hoveredFeatureId = null;
        }
        mapa.getCanvas().style.cursor = '';
      });

      // Evento de clic en los polígonos
      mapa.on('click', 'predios-fill', function (e) {
        if (e.features.length > 0) {
          const feature = e.features[0];
          const properties = feature.properties;

          // Limpiar resaltado anterior
          if (clickedFeatureId !== null) {
            mapa.setFilter('predio-highlight', ['!=', ['get', 'Name'], clickedFeatureId]);
          }

          // Resaltar el polígono seleccionado
          clickedFeatureId = properties.Name;
          mapa.setFilter('predio-highlight', ['==', ['get', 'Name'], clickedFeatureId]);

          // Buscar información adicional en el array de predios
          const predioInfo = predios.find(p => p.codigodepredio === properties.Name);

          // Crear contenido del popup
          let popupContent = `
            <div style="max-width: 300px; font-family: Arial, sans-serif;">
              <h3 style="margin: 0 0 10px 0; color: #1F2937; font-size: 16px; font-weight: bold;">
                ${properties.Name || 'Sin nombre'}
              </h3>
          `;

          if (predioInfo) {
            popupContent += `
              <div style="font-size: 12px; line-height: 1.4; color: #374151;">
                <p><strong>Proyecto:</strong> ${predioInfo.nombredelproyecto || 'N/A'}</p>
                <p><strong>Modalidad:</strong> ${predioInfo.modalidaddeadquisicion || 'N/A'}</p>
                <p><strong>Sujeto Pasivo:</strong> ${predioInfo.sujetopasivo || 'N/A'}</p>
                <p><strong>Tipo de Persona:</strong> ${predioInfo.tipodepersonajuridica || 'N/A'}</p>
                <p><strong>Condición:</strong> ${predioInfo.condiciondelsujetopasivo || 'N/A'}</p>
                <p><strong>N° Resolución:</strong> ${predioInfo.nresolucion || 'N/A'}</p>
                <p><strong>Fecha Resolución:</strong> ${predioInfo.fechaderesolucion || 'N/A'}</p>
                <p><strong>Estado de Pago:</strong> ${predioInfo.estadodepago || 'N/A'}</p>
                <p><strong>Área:</strong> ${predioInfo.areaenmetroscuadrados || 'N/A'} m²</p>
                <p><strong>Oficina Registral:</strong> ${predioInfo.oficinaregistral || 'N/A'}</p>
                <p><strong>Observación:</strong> ${predioInfo.observacion || 'N/A'}</p>
              </div>
              <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
                <a href="${predioInfo.google_maps || '#'}" target="_blank" 
                   style="display: block; padding: 8px 12px; background-color: #3B82F6; color: white; 
                          text-decoration: none; border-radius: 4px; text-align: center; font-size: 12px; font-weight: bold;">
                  Ver en Google Maps
                </a>
                <a href="https://inspeccion.ddp.org.pe/?codigo=${properties.Name}" target="_blank" 
                   style="display: block; padding: 8px 12px; background-color: #10B981; color: white; 
                          text-decoration: none; border-radius: 4px; text-align: center; font-size: 12px; font-weight: bold;">
                  Registrar Inspección
                </a>
              </div>
            </div>
          `;
          } else {
            popupContent += `
              <div style="font-size: 12px; line-height: 1.4; color: #374151;">
                <p><strong>Información:</strong> No se encontraron datos adicionales para este predio.</p>
                <p><strong>ID del Polígono:</strong> ${properties.Name || 'N/A'}</p>
              </div>
            `;
          }

          popupContent += `</div>`;

          // Crear y mostrar el popup
          new mapboxgl.Popup({
            closeButton: true,
            closeOnClick: false,
            maxWidth: '350px'
          })
            .setLngLat(e.lngLat)
            .setHTML(popupContent)
            .addTo(mapa);
        }
      });

      // Evento para limpiar resaltado al hacer clic en el mapa (fuera de polígonos)
      mapa.on('click', function (e) {
        if (!e.features || e.features.length === 0) {
          if (clickedFeatureId !== null) {
            mapa.setFilter('predio-highlight', ['==', ['get', 'Name'], '']);
            clickedFeatureId = null;
          }
        }
      });

    })






    // 5️⃣ Info
    document.getElementById('info-btn').addEventListener('click', () => alert('Información de la aplicación Las Gardenias'));

    // 6️⃣ Modal búsqueda
    const searchBtn = document.getElementById('search-btn');
    const searchModal = document.getElementById('search-modal');
    const searchCancel = document.getElementById('search-cancel');
    //const searchGo     = document.getElementById('search-go');
    const searchInput = document.getElementById('search-input');

    const openModal = () => { searchModal.classList.remove('hidden'); searchInput.focus(); };
    const closeModal = () => { $('#search-input').typeahead('val', ''); searchModal.classList.add('hidden'); };

    // Configuración del typeahead para búsqueda de predios
    const codigos = predioscaja.features.map(feature => feature.properties.codigodepredio);

    $('#search-input').typeahead(
      {
        hint: true,
        highlight: true,
        minLength: 1
      },
      {
        name: 'predios',
        source: function (query, syncResults) {
          const matches = codigos.filter(codigo =>
            codigo.toLowerCase().includes(query.toLowerCase())
          );
          syncResults(matches);
        }
      }
    ).bind('typeahead:select', function (ev, selected) {

      const item = predioscaja.features.find(feature => feature.properties.codigodepredio === selected);

      if (item) {
        closeModal()
        $('#search-input').typeahead('val', '');

        const popuphtml = `
      <strong>Código:</strong> ${item.properties.codigodepredio}<br>
      <strong>Proyecto:</strong> ${item.properties.nombredelproyecto}<br>
      <strong>Modalidad:</strong> ${item.properties.modalidaddeadquisicion}<br>
      <strong>Sujeto:</strong> ${item.properties.sujetopasivo}<br>
      <strong>Tipo Persona:</strong> ${item.properties.tipodepersonajuridica}<br>
      <strong>Condición:</strong> ${item.properties.condiciondelsujetopasivo}<br>
      <strong>Resolución:</strong> ${item.properties.nresolucion}<br>
      <strong>Fecha Resolución:</strong> ${item.properties.fechaderesolucion}<br>
      <strong>Estado de Pago:</strong> ${item.properties.estadodepago}<br>
      <strong>Área:</strong> ${item.properties.areaenmetroscuadrados} m²<br>
      <strong>Observación:</strong> ${item.properties.observacion}<br>
      <div class="mt-2 flex flex-col gap-2">
        <a href="${item.properties.google_maps}" target="_blank"
           class="inline-block px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-center font-semibold transition">
          Ver en Google Maps
        </a>
        <a href="https://inspeccion.ddp.org.pe/?codigo=${item.properties.codigodepredio}" target="_blank"
           class="inline-block px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-center font-semibold transition">
          Registrar inspección
        </a>
      </div>
    `;

        // Resaltar el predio seleccionado
        mapa.setFilter('predio-highlight', ['==', ['get', 'codigodepredio'], item.properties.codigodepredio]);

        // Centrar el mapa en el predio seleccionado (coordenadas: [longitud, latitud])
        mapa.flyTo({ center: [item.properties.x, item.properties.y], zoom: 21, essential: true });

        // Mostrar popup con información (coordenadas: [longitud, latitud])
        new mapboxgl.Popup()
          .setLngLat([item.properties.x, item.properties.y])
          .setHTML(popuphtml)
          .addTo(mapa);
      }
    });
