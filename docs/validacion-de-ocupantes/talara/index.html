    function geojsonToKml (geojson) {

        <b>Oficina Registral:</b> ${props.oficinaregistral || ''}<br/>
        <b>Observación:</b> ${props.observacion || ''}
        ]]>
      </description>
      <Polygon>
        <outerBoundaryIs>
          <LinearRing>
            <coordinates>`;

        coords.forEach(coord => {
          kml += `${coord[0]},${coord[1]},${coord[2] || 0} `;
        });

        kml += `</coordinates>
          </LinearRing>
        </outerBoundaryIs>
      </Polygon>
    </Placemark>`;
      });

      kml += `
  </Document>
</kml>`;

      return kml;
    }

    // 7️⃣ Función para descargar archivo
    function downloadFile (content, filename, contentType) {
      const blob = new Blob([content], { type: contentType });
      const url = window.URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      window.URL.revokeObjectURL(url);
    }

      <strong>Condición:</strong> ${item.properties.condiciondelsujetopasivo}<br>
      <strong>Resolución:</strong> ${item.properties.nresolucion}<br>
      <strong>Fecha Resolución:</strong> ${item.properties.fechaderesolucion}<br>
      <strong>Estado de Pago:</strong> ${item.properties.estadodepago}<br>
      <strong>Área:</strong> ${item.properties.areaenmetroscuadrados} m²<br>
      <strong>Observación:</strong> ${item.properties.observacion}<br>
      <div class="mt-2 flex flex-col gap-2">
        <a href="${item.properties.google_maps}" target="_blank"
           class="inline-block px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-center font-semibold transition">
          Ver en Google Maps
        </a>
        <a href="https://inspeccion.ddp.org.pe/?codigo=${item.properties.codigodepredio}" target="_blank"
           class="inline-block px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-center font-semibold transition">
          Registrar inspección
        </a>
      </div>
    `;

        // Resaltar el predio seleccionado
        mapa.setFilter('predio-highlight', ['==', ['get', 'codigodepredio'], item.properties.codigodepredio]);

        // Centrar el mapa en el predio seleccionado (coordenadas: [longitud, latitud])
        mapa.flyTo({ center: [item.properties.longitud, item.properties.latitud], zoom: 21, essential: true });

        // Mostrar popup con información (coordenadas: [longitud, latitud])
        new mapboxgl.Popup()
          .setLngLat([item.properties.longitud, item.properties.latitud])
          .setHTML(popuphtml)
          .addTo(mapa);
      }
    });


  </script>
</body>

</html>
